<h1>AES 文本加密 / 解密</h1>
<p>用密码对文本做 AES-256-GCM 加密或解密，所有运算在本地浏览器完成，适合在不安全信道传递敏感文本。</p>
<div class="card">
<p>AES-256-GCM 文本加密 / 解密（密钥不离开本机）：</p>
<textarea id="t" rows="3" placeholder="要加密的明文，或要解密的密文"></textarea>
<input id="k" placeholder="加密密码">
<button onclick="enc()">加密</button>
<button onclick="dec()">解密</button>
<textarea id="out" rows="3" readonly placeholder="结果"></textarea>
<script>
var t=document.getElementById('t'),k=document.getElementById('k'),out=document.getElementById('out');
function gk(p,salt){return crypto.subtle.importKey('raw',new TextEncoder().encode(p),'PBKDF2',false,['deriveKey']).then(function(m){return crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:100000,hash:'SHA-256'},m,{name:'AES-GCM',length:256},false,['encrypt','decrypt'])})}
function enc(){var salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12));gk(k.value,salt).then(function(key){return crypto.subtle.encrypt({name:'AES-GCM',iv:iv},key,new TextEncoder().encode(t.value))}).then(function(ct){var b=new Uint8Array(16+12+ct.byteLength);b.set(salt,0);b.set(iv,16);b.set(new Uint8Array(ct),28);out.value=btoa(String.fromCharCode.apply(null,b))}).catch(function(){out.value='加密失败'})}
function dec(){try{var raw=Uint8Array.from(atob(t.value),function(c){return c.charCodeAt(0)});var salt=raw.slice(0,16),iv=raw.slice(16,28),ct=raw.slice(28);gk(k.value,salt).then(function(key){return crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,ct)}).then(function(pt){out.value=new TextDecoder().decode(pt)}).catch(function(){out.value='解密失败：密码错误或密文损坏'})}catch(e){out.value='解密失败：密文格式不正确'}}
</script>
